<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="x-dns-prefetch-control" content="on" />
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,minimal-ui" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://ip-moe.zerodream.net" crossorigin />
    <link rel="preconnect" href="https://ipapi.co" crossorigin />
    <link rel="preconnect" href="https://myip.ipip.net" crossorigin />
    <link rel="preconnect" href="https://my.ip.cn" crossorigin />
    <link rel="preconnect" href="https://api.ip.sb" crossorigin />
    <link rel="dns-prefetch" href="//cdn.jsdelivr.net" />
    <link rel="dns-prefetch" href="//ip-moe.zerodream.net" />
    <link rel="dns-prefetch" href="//ipapi.co" />
    <link rel="dns-prefetch" href="//myip.ipip.net" />
    <link rel="dns-prefetch" href="//my.ip.cn" />
    <link rel="dns-prefetch" href="//api.ip.sb" />
    <link rel="shortcut icon" type="image/ico" href="https://cdn.jsdelivr.net/npm/skx@0.0.1" />
    <title>IP 地址查询</title>
  </head>
  <body>
    <div class="simple-page">
      <div class="simple-column-main">
        <h3>IP 地址查询</h3>
        <p><span class="ip-title">国内 ipip.net</span>&nbsp;:&nbsp;<span id="ip-ipipnet"></span></p>
        <p>
          <span class="ip-title">国内 IP.CN</span>&nbsp;:&nbsp;<span id="ip-cn-ipv4"></span>&nbsp;<span
            id="ip-cn-ipv4-geo"
          ></span>
        </p>
        <p>
          <span class="ip-title">海外 ip.sb</span>&nbsp;:&nbsp;<span id="ip-ipsb"></span>&nbsp;<span
            id="ip-ipsb-geo"
          ></span>
        </p>
        <p>
          <span class="ip-title">海外 ipapi.co</span>&nbsp;:&nbsp;<span id="ip-ipapi"></span>&nbsp;<span
            id="ip-ipapi-geo"
          ></span>
        </p>
      </div>
      <div class="simple-column-side">
        <h3>网站访问检查</h3>
        <p><span class="ip-title">百度搜索</span>&nbsp;:&nbsp;<span id="http-baidu"></span></p>
        <p><span class="ip-title">网易云音乐</span>&nbsp;:&nbsp;<span id="http-163"></span></p>
        <p><span class="ip-title">GitHub</span>&nbsp;:&nbsp;<span id="http-github"></span></p>
        <p><span class="ip-title">YouTube</span>&nbsp;:&nbsp;<span id="http-youtube"></span></p>
      </div>
    </div>
    <script type="module" src="../pages/simple.ts"></script>
  </body>
</html>
